apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: healthcare
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      enableServiceLinks: false
      containers:
        - name: notification-service
          image: anshul9589/shsm-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_PROFILES_ACTIVE
            - name: KAFKA_BOOTSTRAP_SERVER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVER
            - name: KAFKA_GROUP_ID
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_GROUP_ID
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_TOPIC
            - name: MAIL_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MAIL_SERVER_HOST
            - name: MAIL_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MAIL_SERVER_PORT
            - name: MAIL_SERVER_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MAIL_SERVER_USERNAME
            - name: MAIL_SERVER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: MAIL_SERVER_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50"
          resources:
            requests:
              memory: "384Mi"
              cpu: "100m"
            limits:
              memory: "768Mi"      # was 512Mi
              cpu: "500m"
          startupProbe:
            tcpSocket: { port: 8080 }
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 8080 }
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket: { port: 8080 }
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: healthcare
  labels:
    app: notification-service
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
