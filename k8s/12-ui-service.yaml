apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui-service
  namespace: healthcare
  labels:
    app: ui-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ui-service
  template:
    metadata:
      labels:
        app: ui-service
    spec:
      containers:
        - name: ui-service
          image: anshul9589/shsm-ui-service:1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ui-service
  namespace: healthcare
  labels:
    app: ui-service
spec:
  type: NodePort
  selector:
    app: ui-service
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 31000
