spring:
    application:
        name: doctor-service

    boot:
        admin:
            client:
                enabled: true
                instance:
                    name: Doctor Service
                    service-url: http://doctor-service:8080
                url: http://admin-service:8080
                auto-registration: true

    data:
        mongodb:
            uri: ${MONGO_URI}

logging:
    level:
        org:
            springframework:
                web: DEBUG
                servlet: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"   # narrower than "*"
  endpoint:
    health:
      probes:
        enabled: true                                # k8s liveness/readiness groups
  metrics:
    tags:
      application: ${spring.application.name}        # adds `application=` label to every metric
    distribution:
      percentiles-histogram:
        http.server.requests: true                   # so histogram_quantile() works for p95/p99


server:
    port: 8080
