# Installs the prometheus-community/kube-prometheus-stack Helm chart through
# ArgoCD. This replaces the raw `monitoring/k8s/` manifests with the full
# Prometheus Operator bundle (Prometheus, Alertmanager, Grafana, node-exporter,
# kube-state-metrics, all wired up).
#
# Use EITHER this OR monitoring-app.yaml — not both. If you switch:
#   1. Delete `monitoring-app.yaml` from Git so ArgoCD prunes the raw stack.
#   2. Apply this file (push to repo; root-app picks it up).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: healthcare

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.5.0          # pin a chart version; bump deliberately
    helm:
      releaseName: kps
      # Inline value overrides — keep the bulk in monitoring/helm/ and reference
      # it via valueFiles when you switch to a multi-source Application below.
      values: |
        fullnameOverride: kps
        prometheus:
          prometheusSpec:
            retention: 15d
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            resources:
              requests: { cpu: 200m, memory: 512Mi }
              limits:   { cpu: 1,    memory: 2Gi }
        alertmanager:
          alertmanagerSpec:
            resources:
              requests: { cpu: 50m, memory: 64Mi }
              limits:   { cpu: 200m, memory: 256Mi }
          config:
            global: { resolve_timeout: 5m }
            route:
              receiver: "null"
              group_by: ["alertname", "service", "severity"]
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
            receivers:
              - name: "null"
        grafana:
          adminPassword: admin            # override via sealed secret in prod
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              searchNamespace: ALL
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
        nodeExporter:    { enabled: true }
        kubeStateMetrics: { enabled: true }

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      # CRDs in this chart are large — let the upstream resource map manage
      - RespectIgnoreDifferences=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 5m }

  # The chart's installed CRDs include very large schemas; ignore the noisy diffs.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/preserveUnknownFields
        - /status
