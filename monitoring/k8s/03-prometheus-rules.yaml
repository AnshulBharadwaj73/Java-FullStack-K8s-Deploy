apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
data:
  healthcare-alerts.yml: |
    groups:
      - name: healthcare-service-availability
        interval: 30s
        rules:
          - alert: ServiceDown
            expr: up{job="kubernetes-pods"} == 0
            for: 2m
            labels: { severity: critical, team: platform }
            annotations:
              summary: "Service {{ $labels.service }} is down"
              description: "Pod {{ $labels.pod }} in {{ $labels.namespace }} has been unreachable for 2m."

          - alert: KubePodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[10m]) * 600 > 3
            for: 5m
            labels: { severity: warning, team: platform }
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} crash looping"
              description: "Container {{ $labels.container }} restarted >3 times in 10m."

      - name: healthcare-http-slos
        interval: 30s
        rules:
          - alert: HighHttpErrorRate
            expr: |
              sum by (service) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
                /
              sum by (service) (rate(http_server_requests_seconds_count[5m])) > 0.05
            for: 5m
            labels: { severity: critical, team: backend }
            annotations:
              summary: "5xx > 5% on {{ $labels.service }}"

          - alert: HighHttpLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum by (le, service) (rate(http_server_requests_seconds_bucket[5m]))) > 1
            for: 10m
            labels: { severity: warning, team: backend }
            annotations:
              summary: "p95 latency > 1s on {{ $labels.service }}"

      - name: healthcare-jvm
        interval: 30s
        rules:
          - alert: JvmHeapPressure
            expr: |
              sum by (service, pod) (jvm_memory_used_bytes{area="heap"})
                /
              sum by (service, pod) (jvm_memory_max_bytes{area="heap"}) > 0.85
            for: 10m
            labels: { severity: warning, team: backend }
            annotations:
              summary: "JVM heap > 85% on {{ $labels.service }}/{{ $labels.pod }}"

          - alert: HighGcPauseTime
            expr: rate(jvm_gc_pause_seconds_sum[5m]) > 0.5
            for: 10m
            labels: { severity: warning, team: backend }
            annotations:
              summary: "GC pause time high on {{ $labels.service }}"
