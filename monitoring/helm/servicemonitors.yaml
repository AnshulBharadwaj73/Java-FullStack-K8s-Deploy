# ServiceMonitors + PrometheusRule for the kube-prometheus-stack install.
# Apply after kube-prometheus-stack is installed:
#   kubectl apply -f monitoring/helm/servicemonitors.yaml
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: healthcare-spring-boot
  namespace: monitoring
  labels:
    release: kps
spec:
  namespaceSelector:
    matchNames: ["healthcare"]
  selector:
    matchExpressions:
      - { key: app, operator: In, values: [
          gateway-service, auth-service, doctor-service, patient-service,
          appointment-service, notification-service, admin-service
        ] }
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      relabelings:
        - sourceLabels: [__meta_kubernetes_service_label_app]
          targetLabel: service
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: healthcare-alerts
  namespace: monitoring
  labels:
    release: kps
spec:
  groups:
    - name: healthcare-service-availability
      rules:
        - alert: ServiceDown
          expr: up{service=~"gateway-service|auth-service|doctor-service|patient-service|appointment-service|notification-service|admin-service"} == 0
          for: 2m
          labels: { severity: critical, team: platform }
          annotations:
            summary: "Service {{ $labels.service }} is down"

    - name: healthcare-http-slos
      rules:
        - alert: HighHttpErrorRate
          expr: |
            sum by (service) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              /
            sum by (service) (rate(http_server_requests_seconds_count[5m])) > 0.05
          for: 5m
          labels: { severity: critical, team: backend }
          annotations:
            summary: "5xx > 5% on {{ $labels.service }}"

        - alert: HighHttpLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum by (le, service) (rate(http_server_requests_seconds_bucket[5m]))) > 1
          for: 10m
          labels: { severity: warning, team: backend }
          annotations:
            summary: "p95 latency > 1s on {{ $labels.service }}"

    - name: healthcare-jvm
      rules:
        - alert: JvmHeapPressure
          expr: |
            sum by (service, pod) (jvm_memory_used_bytes{area="heap"})
              /
            sum by (service, pod) (jvm_memory_max_bytes{area="heap"}) > 0.85
          for: 10m
          labels: { severity: warning, team: backend }
          annotations:
            summary: "JVM heap > 85% on {{ $labels.service }}/{{ $labels.pod }}"
