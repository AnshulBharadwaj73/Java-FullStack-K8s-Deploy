groups:
  - name: healthcare-service-availability
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job="spring-boot"} == 0
        for: 2m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "Prometheus has been unable to scrape {{ $labels.service }} ({{ $labels.instance }}) for more than 2 minutes."

      - alert: KubePodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[10m]) * 600 > 3
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"
          description: "Container {{ $labels.container }} has restarted more than 3 times in the last 10 minutes."

  - name: healthcare-http-slos
    interval: 30s
    rules:
      - alert: HighHttpErrorRate
        expr: |
          sum by (service) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
          sum by (service) (rate(http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "5xx error rate > 5% on {{ $labels.service }}"
          description: "Service {{ $labels.service }} is returning more than 5% 5xx responses over the last 5 minutes."

      - alert: HighHttpLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, service) (rate(http_server_requests_seconds_bucket[5m]))
          ) > 1
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "P95 latency > 1s on {{ $labels.service }}"
          description: "Service {{ $labels.service }} has p95 request latency above 1s for 10 minutes."

  - name: healthcare-jvm
    interval: 30s
    rules:
      - alert: JvmHeapPressure
        expr: |
          sum by (service, instance) (jvm_memory_used_bytes{area="heap"})
            /
          sum by (service, instance) (jvm_memory_max_bytes{area="heap"}) > 0.85
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "JVM heap > 85% on {{ $labels.service }}"
          description: "{{ $labels.service }} ({{ $labels.instance }}) heap usage above 85% for 10 minutes."

      - alert: HighGcPauseTime
        expr: rate(jvm_gc_pause_seconds_sum[5m]) > 0.5
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "GC pause time high on {{ $labels.service }}"
          description: "JVM spending more than 500ms/sec in GC on {{ $labels.service }}."

  - name: healthcare-infra
    interval: 30s
    rules:
      - alert: NodeHighCpu
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Node CPU > 85% on {{ $labels.instance }}"
          description: "Sustained CPU usage above 85% for 10 minutes."

      - alert: NodeHighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Node memory > 90% on {{ $labels.instance }}"
          description: "Memory usage above 90% for 10 minutes."

      - alert: NodeDiskFillingUp
        expr: |
          (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
                / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "Disk usage > 85% on {{ $labels.instance }}"
          description: "Filesystem {{ $labels.mountpoint }} on {{ $labels.instance }} is above 85% used."
