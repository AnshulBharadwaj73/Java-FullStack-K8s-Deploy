global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: healthcare-local
    environment: dev

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: spring-boot
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["gateway-service:8080"]
        labels: { service: gateway-service }
      - targets: ["auth-service:8080"]
        labels: { service: auth-service }
      - targets: ["doctor-service:8080"]
        labels: { service: doctor-service }
      - targets: ["patient-service:8080"]
        labels: { service: patient-service }
      - targets: ["appointment-service:8080"]
        labels: { service: appointment-service }
      - targets: ["notification-service:8080"]
        labels: { service: notification-service }
      - targets: ["admin-service:8080"]
        labels: { service: admin-service }
