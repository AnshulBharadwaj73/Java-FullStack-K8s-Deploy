# Server configuration
server:
  port: 8080

# Spring Boot Admin Configuration
spring:
  application:
    name: admin-service
  boot:
    admin:
      server:
        enabled: true
        ui:
          title: Healthcare Admin Panel
        context-path: /
      monitor:
        default-retries: 2
        status-interval: 10000
        status-lifetime: 10000
      routes:
        endpoints: info

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"   # narrower than "*"
  endpoint:
    health:
      probes:
        enabled: true                                # k8s liveness/readiness groups
  metrics:
    tags:
      application: ${spring.application.name}        # adds `application=` label to every metric
    distribution:
      percentiles-histogram:
        http.server.requests: true    