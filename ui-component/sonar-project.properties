sonar.projectKey=shsm:ui-service
sonar.projectName=ui-service
sonar.projectVersion=1.0

# Source layout
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx,**/*.test.ts,**/*.test.tsx,**/*.spec.js,**/*.spec.jsx
sonar.exclusions=node_modules/**,build/**,dist/**,coverage/**,public/**

# Coverage (Jest --coverage outputs to coverage/lcov.info by default)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
