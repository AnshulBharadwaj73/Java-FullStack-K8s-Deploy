# Generic EKS overrides — apply on top of values.yaml.
# For per-env, stack: -f values-eks.yaml -f values-{dev,staging,prod}.yaml

image:
  # Set to your AWS account's ECR registry. Override with --set image.repository=... in CI.
  repository: "035809508418.dkr.ecr.us-east-1.amazonaws.com"
  tag: "1.2"
  pullPolicy: IfNotPresent

# Create the gp3 StorageClass so the mongodb PVC below can bind on EKS.
storageClass:
  create: true

mongodb:
  storageClassName: gp3
  storageSize: 20Gi

ui:
  service:
    type: ClusterIP   # ALB Ingress reaches it directly; no NodePort needed
  tag: "1.2"

