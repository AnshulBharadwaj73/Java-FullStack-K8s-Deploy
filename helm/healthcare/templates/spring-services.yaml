{{- $root := . -}}
{{- range .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .name }}
  namespace: {{ $root.Values.namespace }}
  labels:
    {{- include "healthcare.labels" (dict "name" .name "root" $root) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .name }}
  template:
    metadata:
      labels:
        {{- include "healthcare.labels" (dict "name" .name "root" $root) | nindent 8 }}
    spec:
      enableServiceLinks: false
      containers:
        - name: {{ .name }}
          image: "{{ $root.Values.image.repository }}/{{ .image }}:{{ .tag | default $root.Values.image.tag }}"
          imagePullPolicy: {{ $root.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $root.Values.springDefaults.port }}
          env:
            {{- range .configKeys }}
            - name: {{ . }}
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: {{ . }}
            {{- end }}
            {{- range .secretKeys }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: {{ . }}
            {{- end }}
            - name: JAVA_TOOL_OPTIONS
              value: {{ $root.Values.springDefaults.javaToolOptions | quote }}
          resources:
            {{- toYaml $root.Values.springDefaults.resources | nindent 12 }}
          startupProbe:
            tcpSocket:
              port: {{ $root.Values.springDefaults.port }}
            failureThreshold: {{ $root.Values.springDefaults.startupProbe.failureThreshold }}
            periodSeconds: {{ $root.Values.springDefaults.startupProbe.periodSeconds }}
          livenessProbe:
            tcpSocket:
              port: {{ $root.Values.springDefaults.port }}
            periodSeconds: {{ $root.Values.springDefaults.livenessProbe.periodSeconds }}
            failureThreshold: {{ $root.Values.springDefaults.livenessProbe.failureThreshold }}
            timeoutSeconds: {{ $root.Values.springDefaults.livenessProbe.timeoutSeconds }}
          readinessProbe:
            tcpSocket:
              port: {{ $root.Values.springDefaults.port }}
            periodSeconds: {{ $root.Values.springDefaults.readinessProbe.periodSeconds }}
            failureThreshold: {{ $root.Values.springDefaults.readinessProbe.failureThreshold }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}
  namespace: {{ $root.Values.namespace }}
  labels:
    {{- include "healthcare.labels" (dict "name" .name "root" $root) | nindent 4 }}
spec:
  selector:
    app: {{ .name }}
  ports:
    - name: http
      port: {{ $root.Values.springDefaults.port }}
      targetPort: {{ $root.Values.springDefaults.port }}
{{- end }}