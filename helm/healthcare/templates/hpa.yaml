{{- if .Values.hpa.enabled }}
{{- $root := . -}}
{{- range .Values.services }}
{{- $svcHpa := .hpa | default dict }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .name }}
  namespace: {{ $root.Values.namespace }}
  labels:
    {{- include "healthcare.labels" (dict "name" .name "root" $root) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .name }}
  minReplicas: {{ $svcHpa.minReplicas | default $root.Values.hpa.minReplicas }}
  maxReplicas: {{ $svcHpa.maxReplicas | default $root.Values.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $root.Values.hpa.targetCPUUtilizationPercentage }}
    {{- if $root.Values.hpa.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $root.Values.hpa.targetMemoryUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0     # scale up fast on spikes
    scaleDown:
      stabilizationWindowSeconds: 300   # scale down slowly to avoid flapping
{{- end }}
{{- end }}
