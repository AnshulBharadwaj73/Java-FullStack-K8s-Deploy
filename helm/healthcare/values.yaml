namespace: healthcare
createNamespace: true

image:
  repository: anshul9589
  tag: "latest"               # default tag for Spring Boot services; override per-service via services[].tag
  pullPolicy: IfNotPresent

# Non-secret config — becomes ConfigMap "app-config"
config:
  SPRING_PROFILES_ACTIVE: "prod"
  GATEWAY_SERVICE_PORT: "8080"
  KAFKA_BOOTSTRAP_SERVER: "kafka:9092"
  KAFKA_TOPIC: "appointments"
  KAFKA_GROUP_ID: "appointment-notifications-group"
  MAIL_SERVER_HOST: "smtp.gmail.com"
  MAIL_SERVER_PORT: "587"
  MAIL_SERVER_USERNAME: "anshul.dub98@gmail.com"
  MONGO_HOST: "mongodb"
  MONGO_PORT: "27017"
  MONGO_DB: "healthcare"

# Secret values — becomes Secret "app-secret"
# In prod, override these via --set or values-prod.yaml; never commit real secrets.
secret:
  JWT_SECRET: "aHR0cHM6Ly93d3cueW91YmlsdW1hbWVyaWNhLmNvbS9sb2dpbi8="
  MONGO_USERNAME: "root"
  MONGO_PASSWORD: "rootpassword"
  MONGO_URI: "mongodb://root:rootpassword@mongodb:27017/healthcare?authSource=admin"
  MAIL_SERVER_PASSWORD: "mpgmgseojqbsqova"

mongodb:
  enabled: true
  image: mongo:latest
  storageSize: 2Gi
  storageClassName: ""    # blank = use the cluster default; set to "gp3" on EKS
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

kafka:
  enabled: true
  replicas: 1
  image: docker.io/bitnamilegacy/kafka:3.8
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

ui:
  enabled: true
  image: shsm-ui-service
  tag: "1.0"                  # UI is the only one on a versioned tag right now
  service:
    type: NodePort
    port: 80
    nodePort: 31000
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "300m"

ingress:
  enabled: true
  className: nginx
  host: healthcare.local
  annotations: {}
  paths:
    - path: /api
      pathType: Prefix
      service: gateway-service
      port: 8080
    - path: /
      pathType: Prefix
      service: ui-service
      port: 80

# Defaults applied to every Spring Boot service. Override per-service via .services[].overrides.
springDefaults:
  port: 8080
  resources:
    requests:
      memory: "384Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "500m"
  javaToolOptions: "-XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50"
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10
  livenessProbe:
    periodSeconds: 30
    failureThreshold: 5
    timeoutSeconds: 5
  readinessProbe:
    periodSeconds: 10
    failureThreshold: 3

# Spring Boot services. `configKeys` and `secretKeys` reference entries in .config / .secret above.
services:
  - name: gateway-service
    image: shsm-gateway-service
    configKeys: [SPRING_PROFILES_ACTIVE, GATEWAY_SERVICE_PORT]
    secretKeys: [JWT_SECRET]

  - name: auth-service
    image: shsm-auth-service
    configKeys: [SPRING_PROFILES_ACTIVE]
    secretKeys: [MONGO_URI, JWT_SECRET]

  - name: doctor-service
    image: shsm-doctor-service
    configKeys: [SPRING_PROFILES_ACTIVE]
    secretKeys: [MONGO_URI]

  - name: patient-service
    image: shsm-patient-service
    configKeys: [SPRING_PROFILES_ACTIVE]
    secretKeys: [MONGO_URI]

  - name: appointment-service
    image: shsm-appointment-service
    configKeys: [SPRING_PROFILES_ACTIVE, KAFKA_BOOTSTRAP_SERVER, KAFKA_TOPIC]
    secretKeys: [MONGO_URI]

  - name: notification-service
    image: shsm-notification-service
    configKeys:
      - SPRING_PROFILES_ACTIVE
      - KAFKA_BOOTSTRAP_SERVER
      - KAFKA_GROUP_ID
      - KAFKA_TOPIC
      - MAIL_SERVER_HOST
      - MAIL_SERVER_PORT
      - MAIL_SERVER_USERNAME
    secretKeys: [MAIL_SERVER_PASSWORD]

  - name: admin-service
    image: shsm-admin-service
    configKeys: [SPRING_PROFILES_ACTIVE]
    secretKeys: [MONGO_URI]
