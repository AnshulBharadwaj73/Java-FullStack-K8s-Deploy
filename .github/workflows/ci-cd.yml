  #       if: steps.sonar.outputs.configured == 'true' && matrix.service == 'ui-service'
  #       with:
  #         node-version: '20'
  #         cache: 'npm'
  #         cache-dependency-path: ui-component/package-lock.json

  #     - name: Cache Sonar packages
  #       if: steps.sonar.outputs.configured == 'true'
  #       uses: actions/cache@v4
  #       with:
  #         path: ~/.sonar/cache
  #         key: sonar-${{ runner.os }}
  #         restore-keys: sonar-${{ runner.os }}

  #     - name: Run scan
  #       if: steps.sonar.outputs.configured == 'true'
  #       env:
  #         SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
  #         SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
  #         SONAR_ORG:      ${{ vars.SONAR_ORG }}
  #         # Don't fail the workflow on quality-gate failure for PRs;
  #         # do fail on push (so merges to main respect the gate).
  #         SONAR_QUALITY_GATE_WAIT: ${{ needs.setup.outputs.is_pr == 'true' && 'false' || 'true' }}
  #       run: |
  #         chmod +x ci/scripts/sonar-scan.sh
  #         ci/scripts/sonar-scan.sh "${{ matrix.service }}"

  # ───────────────────────────────────────────────────────────────
  # Production approval gate — uses GitHub Environments.
  # Configure required reviewers under repo → Settings → Environments → production.
  # ───────────────────────────────────────────────────────────────
  approve-prod:
    name: Approve production deploy
    needs: [setup, build]
    if: needs.setup.outputs.environment == 'prod' && needs.setup.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production-approval
      url: https://healthcare.example.com
    steps:
      - run: echo "Approved to deploy ${{ needs.setup.outputs.image_tag }} to prod."

  # ───────────────────────────────────────────────────────────────
  # Deploy via Helm to EKS.
  # ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS (${{ needs.setup.outputs.environment }})
    needs: [setup, build, approve-prod]
    # approve-prod is skipped for non-prod; allow that via always() + explicit success of build.
    if: |
      always() &&
      needs.setup.outputs.is_rollback != 'true' &&
      needs.setup.outputs.should_deploy == 'true' &&
      needs.build.result == 'success' &&
      (needs.approve-prod.result == 'success' || needs.approve-prod.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.setup.outputs.environment }}
      url: https://healthcare.example.com
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: azure/setup-helm@v4
        with: { version: 'v3.14.0' }

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name healthcare-eks-${{ needs.setup.outputs.environment }} \
            --region $AWS_REGION
          kubectl get nodes

      - name: Helm upgrade --install --atomic
        env:
          ENVIRONMENT: ${{ needs.setup.outputs.environment }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
        run: |
          chmod +x ci/scripts/deploy.sh
          ci/scripts/deploy.sh "${ENVIRONMENT}" "${{ needs.setup.outputs.image_tag }}"

      - name: Smoke test
        run: |
          chmod +x ci/scripts/smoke-test.sh
          ci/scripts/smoke-test.sh "${{ needs.setup.outputs.environment }}"

      - name: Rollback on failure
        if: failure()
        run: |
          helm history $HELM_RELEASE -n $HELM_NAMESPACE
          helm rollback $HELM_RELEASE 0 -n $HELM_NAMESPACE --wait --timeout 10m || true
          kubectl get pods -n $HELM_NAMESPACE

