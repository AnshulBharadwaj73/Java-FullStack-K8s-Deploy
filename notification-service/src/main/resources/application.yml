spring:
  application:
    name: notification-service

  boot:
    admin:
      client:
        enabled: true
        instance:
          name: Notification Service
          service-url: http://notification-service:8080
        url: http://admin-service:8080
        auto-registration: true

  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER}
      group-id: mygroupid
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    topic:
      name: ${KAFKA_TOPIC}

  mail:
    host: smtp.gmail.com
    port: 587
    username: anshul.dub98@gmail.com
    password: jcvzxzyjmlonxmpf
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"   # narrower than "*"
  endpoint:
    health:
      probes:
        enabled: true                                # k8s liveness/readiness groups
  metrics:
    tags:
      application: ${spring.application.name}        # adds `application=` label to every metric
    distribution:
      percentiles-histogram:
        http.server.requests: true                   # so histogram_quantile() works for p95/p99


server:
  port: 8080
