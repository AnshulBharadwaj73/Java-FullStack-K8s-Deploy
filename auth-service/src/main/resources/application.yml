spring:
  application:
    name: auth-service

  boot:
    admin:
      client:
        enabled: true
        instance:
          name: Auth Service
          service-url: http://auth-service:8080
        url: http://admin-service:8080
        auto-registration: true

  data:
    mongodb:
      uri: ${MONGO_URI}

logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.servlet: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"   # narrower than "*"
  endpoint:
    health:
      probes:
        enabled: true                                # k8s liveness/readiness groups
  metrics:
    tags:
      application: ${spring.application.name}        # adds `application=` label to every metric
    distribution:
      percentiles-histogram:
        http.server.requests: true                   # so histogram_quantile() works for p95/p99


server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
