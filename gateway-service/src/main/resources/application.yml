spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]': # Apply to all routes
            allowedOrigins:
              - http://localhost:9090 # Your React frontend
              - http://localhost:5173
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

  application:
    name: gateway-service

  boot:
    admin:
      client:
        enabled: true
        instance:
          name: Gateway Service
          service-url: http://gateway-service:8080
        url: http://admin-service:8080
        auto-registration: true

  main:
    web-application-type: reactive

  logging:
    level:
      org.springframework.cloud.gateway: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"   # narrower than "*"
  endpoint:
    health:
      probes:
        enabled: true                                # k8s liveness/readiness groups
  metrics:
    tags:
      application: ${spring.application.name}        # adds `application=` label to every metric
    distribution:
      percentiles-histogram:
        http.server.requests: true                   # so histogram_quantile() works for p95/p99


server:
  port: ${GATEWAY_SERVICE_PORT}

jwt:
  secret: ${JWT_SECRET}
